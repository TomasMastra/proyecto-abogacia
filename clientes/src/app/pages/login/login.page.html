<div class="login-wrapper">

  <div class="login-brand">
    <mat-icon class="brand-icon">gavel</mat-icon>
    <span class="brand-name">SISTEMA ABOGACÍA</span>
  </div>

  <div class="login-card">
    <div class="login-header">
      <h1>Iniciar sesión</h1>
      <p>Ingresá tus credenciales para acceder al sistema</p>
    </div>

    <div class="login-form">

      <div class="field-group">
        <label class="field-label">Email</label>
        <div class="field-input-wrap" [class.focused]="emailFocused">
          <mat-icon>mail_outline</mat-icon>
          <input
            type="email"
            placeholder="tu@email.com"
            [(ngModel)]="email"
            (focus)="emailFocused = true"
            (blur)="emailFocused = false"
            (keyup.enter)="login()"
          />
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Contraseña</label>
        <div class="field-input-wrap" [class.focused]="passFocused">
          <mat-icon>lock_outline</mat-icon>
          <input
            [type]="showPass ? 'text' : 'password'"
            placeholder="••••••••"
            [(ngModel)]="password"
            (focus)="passFocused = true"
            (blur)="passFocused = false"
            (keyup.enter)="login()"
          />
          <button class="toggle-pass" (click)="showPass = !showPass" type="button">
            <mat-icon>{{ showPass ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </div>
      </div>

      <button class="login-btn" (click)="login()" [disabled]="cargando">
        <span *ngIf="!cargando">Ingresar</span>
        <span *ngIf="cargando" class="loading-dots">
          <span></span><span></span><span></span>
        </span>
      </button>

    </div>
  </div>

</div>
