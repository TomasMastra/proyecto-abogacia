<div class="page-wrapper">

  <div class="page-header">
    <h1 class="page-title">Mediaciones</h1>
  </div>

  <div class="list-card">

    <div class="toolbar">
      <div class="search-wrap">
        <mat-icon class="search-icon">search</mat-icon>
        <input class="search-input" placeholder="Buscar por número, año o carátula..."
          [(ngModel)]="busqueda" (ngModelChange)="filtrar()" />
      </div>

      <div class="filter-select-wrap">
        <select class="filter-select" [(ngModel)]="procuradorSeleccionado" (change)="filtrar()">
          <option value="">Todos los procuradores</option>
          <option *ngFor="let u of listaUsuarios" [value]="u.id">{{ u.nombre }}</option>
        </select>
        <mat-icon class="select-chevron">expand_more</mat-icon>
      </div>

      <div class="filter-select-wrap">
        <select class="filter-select" [(ngModel)]="estadoSeleccionado" (change)="filtrar()">
          <option value="">Todos los estados</option>
          <option *ngFor="let e of estadosMediacion" [value]="e">{{ e }}</option>
        </select>
        <mat-icon class="select-chevron">expand_more</mat-icon>
      </div>

      <div class="toolbar-actions">
        <button class="btn btn--primary" (click)="abrirDialog()">
          <mat-icon>add</mat-icon>
          <span>Nueva mediación</span>
        </button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Carátula</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Abogado</th>
            <th>Procurador</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr class="skeleton-table-row" *ngFor="let _ of skeletonRows" [hidden]="!cargando">
            <td><div class="skeleton-cell sk-lg"></div></td>
            <td><div class="skeleton-cell sk-sm"></div></td>
            <td><div class="skeleton-cell sk-sm"></div></td>
            <td><div class="skeleton-cell sk-md"></div></td>
            <td><div class="skeleton-cell sk-md"></div></td>
            <td><div class="skeleton-cell sk-xs"></div></td>
          </tr>

          <ng-container *ngIf="!cargando && listaPaginada.length > 0">
            <tr *ngFor="let item of listaPaginada">
              <td class="td-caratula">{{ item.caratula }}</td>
              <td>{{ mostrarFecha(item.fecha_inicio) || '—' }}</td>
              <td><span class="estado-chip">{{ item.estado }}</span></td>
              <td>{{ getNombreAbogado(item.usuario_id) }}</td>
              <td>{{ getNombreAbogado(item.procurador_id) }}</td>
              <td>
                <div class="row-actions">
                  <button class="action-icon-btn" matTooltip="Editar" (click)="abrirModificar(item); $event.stopPropagation()">
                    <mat-icon>edit</mat-icon>
                  </button>
                  <button class="action-icon-btn action-icon-btn--danger" matTooltip="Eliminar" (click)="eliminarExpediente(item); $event.stopPropagation()">
                    <mat-icon>delete_outline</mat-icon>
                  </button>
                </div>
              </td>
            </tr>
            <tr *ngIf="listaPaginada.length === 0 && !cargando">
              <td colspan="6" class="empty-row">
                <mat-icon>gavel</mat-icon>
                No se encontraron mediaciones
              </td>
            </tr>
          </ng-container>
        </tbody>
      </table>
    </div>

    <mat-paginator
      [length]="mediaciones.length"
      [pageSize]="pageSize"
      [pageSizeOptions]="[10, 20, 50, 100]"
      [pageIndex]="pageIndex"
      (page)="onPageChange($event)"
      showFirstLastButtons>
    </mat-paginator>

  </div>
</div>
