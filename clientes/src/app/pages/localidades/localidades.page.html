<div class="page-wrapper">

  <div class="page-header">
    <h1 class="page-title">Localidades</h1>
  </div>

  <div class="list-card">

    <div class="toolbar">
      <div class="search-wrap">
        <mat-icon class="search-icon">search</mat-icon>
        <input class="search-input" placeholder="Buscar localidad..."
          [(ngModel)]="busqueda" (ngModelChange)="buscar()" />
      </div>
      <div class="toolbar-actions">
        <button class="btn btn--primary" (click)="abrirDialog()">
          <mat-icon>add</mat-icon>
          <span>Agregar localidad</span>
        </button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Localidad</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr class="skeleton-table-row" *ngFor="let _ of skeletonRows" [hidden]="!cargando">
            <td><div class="skeleton-cell sk-lg"></div></td>
            <td><div class="skeleton-cell sk-xs"></div></td>
          </tr>

          <ng-container *ngIf="!cargando">
            <tr *ngFor="let localidad of listaPaginada">
              <td class="td-nombre">{{ localidad.localidad }}</td>
              <td>
                <div class="row-actions">
                  <button class="action-icon-btn" matTooltip="Editar" (click)="abrirModificar(localidad)">
                    <mat-icon>edit</mat-icon>
                  </button>
                  <button class="action-icon-btn action-icon-btn--danger" matTooltip="Eliminar" (click)="eliminarLocalidad(localidad)">
                    <mat-icon>delete_outline</mat-icon>
                  </button>
                </div>
              </td>
            </tr>
            <tr *ngIf="listaPaginada.length === 0">
              <td colspan="2" class="empty-row">
                <mat-icon>location_on</mat-icon>
                No se encontraron localidades
              </td>
            </tr>
          </ng-container>
        </tbody>
      </table>
    </div>

    <mat-paginator
      [length]="localidades.length"
      [pageSize]="pageSize"
      [pageSizeOptions]="[10, 20, 50, 100]"
      [pageIndex]="pageIndex"
      (page)="onPageChange($event)"
      showFirstLastButtons>
    </mat-paginator>

  </div>
</div>
