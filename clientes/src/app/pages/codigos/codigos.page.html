<div class="page-wrapper">

  <div class="page-header">
    <h1 class="page-title">Códigos</h1>
  </div>

  <div class="list-card">

    <div class="toolbar">
      <div class="search-wrap">
        <mat-icon class="search-icon">search</mat-icon>
        <input class="search-input" placeholder="Buscar por tipo, código o descripción..."
          [(ngModel)]="busqueda" (ngModelChange)="buscar()" />
      </div>
      <div class="toolbar-actions">
        <button class="btn btn--primary" (click)="agregarCodigo()">
          <mat-icon>add</mat-icon>
          <span>Agregar código</span>
        </button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Tipo</th>
            <th>Código</th>
            <th>Descripción</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr class="skeleton-table-row" *ngFor="let _ of skeletonRows" [hidden]="!cargando">
            <td><div class="skeleton-cell sk-sm"></div></td>
            <td><div class="skeleton-cell sk-sm"></div></td>
            <td><div class="skeleton-cell sk-lg"></div></td>
            <td><div class="skeleton-cell sk-xs"></div></td>
          </tr>

          <ng-container *ngIf="!cargando">
            <tr *ngFor="let j of listaPaginada">
              <td><span class="tipo-chip">{{ j.tipo | titlecase }}</span></td>
              <td class="td-nombre">{{ j.codigo }}</td>
              <td class="td-desc">{{ j.descripcion }}</td>
              <td>
                <div class="row-actions">
                  <button class="action-icon-btn action-icon-btn--danger" matTooltip="Eliminar" (click)="eliminarCodigos(j)">
                    <mat-icon>delete_outline</mat-icon>
                  </button>
                </div>
              </td>
            </tr>
            <tr *ngIf="listaPaginada.length === 0">
              <td colspan="4" class="empty-row">
                <mat-icon>tag</mat-icon>
                No se encontraron códigos
              </td>
            </tr>
          </ng-container>
        </tbody>
      </table>
    </div>

    <mat-paginator
      [length]="codigos.length"
      [pageSize]="pageSize"
      [pageSizeOptions]="[10, 20, 50, 100]"
      [pageIndex]="pageIndex"
      (page)="onPageChange($event)"
      showFirstLastButtons>
    </mat-paginator>

  </div>
</div>
