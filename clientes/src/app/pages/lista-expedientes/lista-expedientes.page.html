<div class="page-wrapper">

  <div class="page-header">
    <h1 class="page-title">Expedientes</h1>
  </div>

  <div class="list-card">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <mat-icon class="search-icon">search</mat-icon>
        <input
          class="search-input"
          placeholder="Buscar expediente..."
          [(ngModel)]="busqueda"
          (ngModelChange)="filtrar()"
          (keyup.enter)="filtrar()"
        />
        <button class="clear-btn" *ngIf="busqueda" (click)="busqueda = ''; filtrar()">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <div class="toolbar-actions">
        <button class="btn btn--primary" (click)="abrirDialog()" *ngIf="verificarRol()">
          <mat-icon>add</mat-icon>
          <span>Nuevo Expediente</span>
        </button>
        <button class="btn btn--icon" matTooltip="Descargar">
          <mat-icon>download</mat-icon>
        </button>
        <button class="btn btn--icon" matTooltip="Más opciones">
          <mat-icon>more_vert</mat-icon>
        </button>
      </div>
    </div>

    <!-- Tabla -->
    <div class="table-wrap">

      <!-- Header -->
      <div class="table-header">
        <div class="col-num">Nº expediente</div>
        <div class="col-caratula">Carátula</div>
        <div class="col-acciones"></div>
      </div>

      <!-- Skeleton -->
      <ng-container *ngIf="cargando">
        <div class="skeleton-row" *ngFor="let _ of skeletonRows">
          <div class="skeleton-line sk-num"></div>
          <div class="skeleton-line sk-caratula"></div>
        </div>
      </ng-container>

      <!-- Empty state -->
      <div class="empty-state" *ngIf="!cargando && expedientesPaginados.length === 0">
        <mat-icon>folder_open</mat-icon>
        <p>No se encontraron expedientes</p>
      </div>

      <!-- Filas -->
      <ng-container *ngIf="!cargando && expedientesPaginados.length > 0">
        <div class="table-row"
          *ngFor="let exp of expedientesPaginados; trackBy: trackByExpedientes">

          <div class="row-main">
            <div class="col-num">
              <span class="exp-num" *ngIf="exp.tipo_registro !== 'mediacion'">
                {{ exp.numero }}/{{ exp.anio }}
              </span>
              <span class="exp-badge exp-badge--mediacion" *ngIf="exp.tipo_registro === 'mediacion'">
                Mediación
              </span>
            </div>

            <div class="col-caratula">
              <span class="caratula-text">{{ exp.caratula }}</span>
              <div class="caratula-meta" *ngIf="exp.estado">
                <span class="estado-chip" [ngClass]="'estado-' + exp.estado?.toLowerCase()?.replace(' ', '-')">
                  {{ exp.estado }}
                </span>
              </div>
            </div>

            <div class="col-acciones" (click)="$event.stopPropagation()">
              <button class="action-icon-btn" matTooltip="Editar"
                *ngIf="verificarRol()" (click)="abrirModificar(exp)">
                <mat-icon>edit</mat-icon>
              </button>
              <button class="action-icon-btn action-icon-btn--danger" matTooltip="Eliminar"
                *ngIf="verificarRol()" (click)="eliminarExpediente(exp)">
                <mat-icon>delete_outline</mat-icon>
              </button>
            </div>
          </div>

        </div>
      </ng-container>
    </div>

    <!-- Paginador -->
    <mat-paginator
      *ngIf="!cargando"
      [length]="expedientes.length"
      [pageSize]="pageSize"
      [pageSizeOptions]="[15, 30, 50, 100]"
      [pageIndex]="pageIndex"
      (page)="onPageChange($event)"
      showFirstLastButtons>
    </mat-paginator>

  </div>
</div>
