<div class="page-wrapper">

  <div class="page-header">
    <h1 class="page-title">Gráficos de gestión</h1>
  </div>

  <div class="controls-card">
    <div class="control-group">
      <label class="control-label">Mostrar</label>
      <div class="select-wrap">
        <mat-icon class="select-icon">bar_chart</mat-icon>
        <select [(ngModel)]="tipoGrafico" class="custom-select">
          <option value="">Seleccioná un gráfico</option>
          <option value="cobros">Total cobrado por mes</option>
          <option value="demandados">Cantidad de demandados</option>
        </select>
        <mat-icon class="select-arrow">expand_more</mat-icon>
      </div>
    </div>

    <div class="control-group" *ngIf="tipoGrafico === 'demandados'">
      <label class="control-label">Mes</label>
      <div class="select-wrap">
        <mat-icon class="select-icon">calendar_month</mat-icon>
        <select
          [(ngModel)]="mesSeleccionado"
          (change)="actualizarDemandadosPorNombreEnMes(mesSeleccionado)"
          class="custom-select">
          <option *ngFor="let mes of mesesDisponibles" [value]="mes">{{ mes }}</option>
        </select>
        <mat-icon class="select-arrow">expand_more</mat-icon>
      </div>
    </div>
  </div>

  <!-- Estado vacío -->
  <div class="empty-state" *ngIf="!tipoGrafico">
    <mat-icon>insert_chart_outlined</mat-icon>
    <p>Seleccioná un tipo de gráfico para comenzar</p>
  </div>

  <!-- Gráfico -->
  <div class="chart-card" *ngIf="tipoGrafico">
    <div class="chart-header">
      <h2 class="chart-title">
        {{ tipoGrafico === 'cobros' ? 'Total cobrado por mes' : 'Demandados en ' + mesSeleccionado }}
      </h2>
    </div>
    <div class="chart-body">
      <app-chart-cobranzas
        *ngIf="tipoGrafico === 'cobros'"
        [cobrosPorMes]="cobrosPorMes">
      </app-chart-cobranzas>

      <app-chart-cobranzas
        *ngIf="tipoGrafico === 'demandados'"
        [demandadosPorNombre]="demandadosPorNombre">
      </app-chart-cobranzas>
    </div>
  </div>

</div>
